server:
  port: 8123
  servlet:
    context-path: /

# 可选：本地覆盖配置（数据库密码等），见 application-local.yml.example
spring:
  config:
    import: optional:classpath:application-local.yml

  application:
    name: axon-link-server

  # 建表脚本可重复执行（CREATE IF NOT EXISTS）；RDS 账号需有 mall_admin 库下 DDL 权限
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/migration/V1__schema.sql

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 可通过环境变量或 application-local.yml 覆盖
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/mall_admin?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&allowMultiQueries=true&rewriteBatchedStatements=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # 静态资源（Vue3 dist 文件）
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.axonlink.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.axonlink: info
    org.apache.tomcat.util.net: warn
    org.apache.tomcat: warn
    org.apache.catalina: warn
    com.alibaba.druid: warn

# ── 源码索引配置 ────────────────────────────────────────────────────────────
project:
  # 替换为实际工程根目录；也可在 application-local.yml 中覆盖
  source-roots: ${PROJECT_SOURCE_ROOTS:}

  index-threads: 0
