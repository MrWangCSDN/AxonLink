server:
  port: 8123
  servlet:
    context-path: /

# 可选：本地覆盖配置，见 application-local.yml.example
spring:
  config:
    import: optional:classpath:application-local.yml

  application:
    name: axon-link-server

  # 静态资源（Vue3 dist 文件）
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

logging:
  level:
    com.axonlink: info
    org.apache.tomcat.util.net: warn
    org.apache.tomcat: warn
    org.apache.catalina: warn
    # DAO 索引巡检模块排查时打开 DEBUG：
    #   com.axonlink.ai.daoindex.sqlinspect.llm: DEBUG       # LLM 分析各阶段耗时明细
    #   com.axonlink.ai.daoindex.sqlinspect.explain: DEBUG   # EXPLAIN 尝试序列 / 字段采样
    #   com.axonlink.ai.daoindex.sqlinspect.service: DEBUG   # 规则引擎编排

# ── 源码索引配置 ────────────────────────────────────────────────────────────
# source-roots：直接写死若干 src/main/java 目录（逗号分隔）
# workspace-roots：多工程/多模块聚合根目录，自动递归发现子路径下的 src/main/java 与生成源码目录
project:
  source-roots: ${PROJECT_SOURCE_ROOTS:}
  workspace-roots: ${PROJECT_WORKSPACE_ROOTS:}

  index-threads: 0

# ── 代码扫描配置 ──────────────────────────────────────────────────────────────
callgraph:
  include-packages: ${CALLGRAPH_INCLUDE_PACKAGES:cn.sunline.ltts.busi}

# ── Neo4j 图数据库配置 ────────────────────────────────────────────────────────
neo4j:
  enabled: ${NEO4J_ENABLED:false}
  uri: ${NEO4J_URI:bolt://localhost:7687}
  username: ${NEO4J_USERNAME:neo4j}
  password: ${NEO4J_PASSWORD:axonlink123}

flowtran:
  # 服务启动完成后是否自动触发一次 Neo4j 异步构建
  startup-auto-build: ${FLOWTRAN_STARTUP_AUTO_BUILD:true}
  # 当前运行环境标识，仅用于页面展示与日志标记
  datasource: ${FLOWTRAN_DATASOURCE:local}
  cache:
    # 是否启动时预热 XML/Neo4j 元数据缓存
    enabled: ${FLOWTRAN_CACHE_ENABLED:true}
    # 是否启用影响分析投影缓存
    impact-projection-enabled: ${FLOWTRAN_IMPACT_PROJECTION_ENABLED:true}
    # 影响分析投影快照目录
    impact-projection-dir: ${FLOWTRAN_IMPACT_PROJECTION_DIR:data/cache}
    # 是否在启动时读取影响分析投影快照
    impact-projection-load-on-startup: ${FLOWTRAN_IMPACT_PROJECTION_LOAD_ON_STARTUP:true}

benchmark:
  build-status:
    # ⚠️ 已弃用：原本 axon-link-server 通过 HTTP 调 sunline-benchmark 取构建状态。
    # 现在改成共享 MySQL 库（benchmarkdb）直接 SELECT build_operation_record 表，
    # 不再需要这个 base-url。保留配置项是为了兼容老部署 yml，新部署可以不填。
    base-url: ${BENCHMARK_BUILD_STATUS_BASE_URL:http://127.0.0.1:8080}
    timeout-ms: ${BENCHMARK_BUILD_STATUS_TIMEOUT_MS:5000}

# 编译完成后自动拉起 Neo4j 图谱重建（phase0_bootstrap → ...）
build-sync:
  auto-phase:
    # true：发现 build_operation_record 出现新的 SUCCESS TASK → 自动调 neo4j build/async
    # false：完全人工，需手动 POST /api/neo4j/build/async
    enabled: ${BUILD_SYNC_AUTO_PHASE_ENABLED:true}

ai:
  analysis:
    enabled: ${AI_ANALYSIS_ENABLED:false}
    provider: ${AI_ANALYSIS_PROVIDER:glm5}
    business-prompt-version: ${AI_ANALYSIS_BUSINESS_PROMPT_VERSION:v1}
    technical-prompt-version: ${AI_ANALYSIS_TECHNICAL_PROMPT_VERSION:v1}
    max-code-snippets: ${AI_ANALYSIS_MAX_CODE_SNIPPETS:8}
    max-code-chars-per-snippet: ${AI_ANALYSIS_MAX_CODE_CHARS_PER_SNIPPET:3000}
    # 单次 LLM HTTP 请求超时（秒）。
    # ⚠️ 不要随便调到 600+：上游 504 时本地 HTTP 客户端要等满整个超时时间才知道失败，
    # 配合重试一条 item 可能浪费 10+ 分钟。120 秒已经能容纳带思考链的慢响应。
    request-timeout-seconds: ${AI_ANALYSIS_REQUEST_TIMEOUT_SECONDS:120}
    cache:
      enabled: ${AI_ANALYSIS_CACHE_ENABLED:true}
      ttl-minutes: ${AI_ANALYSIS_CACHE_TTL_MINUTES:30}
    glm5:
      # ⚠️ base-url 只写到端口，不要带 /v1（chat-path 里已经有 /v1 了，否则会 /v1/v1 重复）
      base-url: ${AI_ANALYSIS_GLM5_BASE_URL:http://aihub.spdbdev.com:3000}
      api-key: ${AI_ANALYSIS_GLM5_API_KEY:}
      # ⚠️ 内网 aihub 注册的模型 id 是 glm-47（无点号，见 /v1/models 响应）
      model: ${AI_ANALYSIS_GLM5_MODEL:glm-47}
      chat-path: ${AI_ANALYSIS_GLM5_CHAT_PATH:/v1/chat/completions}
      # 底层 HTTP 是否使用 SSE 流式协议，analyze() 与 stream() 都会尊重此配置：
      #   false → 非流式，整段一次返回（前端 XML 解读 loading 后整段一次出现）
      #   true  → SSE 流式，逐 token 推送（前端 XML 解读可见逐字出现效果）
      stream: ${AI_ANALYSIS_GLM5_STREAM:false}
      temperature: ${AI_ANALYSIS_GLM5_TEMPERATURE:0.2}
      # max-tokens：
      #   ⚠️ 内网 glm-47 是"思考模型"，内部先输出 reasoning_content（思考过程），
      #      再输出 content（最终 JSON）。如果 max_tokens 小于"思考 + 输出"总和，
      #      思考过程会把所有 token 吃光，content 为空 → 报错"模型响应未返回 message.content"。
      #   所以 max_tokens 要给足：
      #     - 输入 ~1200 tokens
      #     - 思考 ~2000~3000 tokens（glm-47 思考阶段很能写）
      #     - 输出 ~500 tokens（JSON 结构化结果）
      #     - 合计需要 4096 ~ 6144
      #   默认 8192 给思考型模型留足配额，避免 JSON 输出被截断。
      max-tokens: ${AI_ANALYSIS_GLM5_MAX_TOKENS:8192}
      # enable-thinking：是否允许思考型模型（GLM-Z1 / DeepSeek-R1）输出 reasoning_content。
      #   false（默认，强烈建议）：请求体追加 enable_thinking=false，模型直接给最终 JSON，
      #          不浪费 token 在 <think> 块上，彻底避免 max_tokens 被吃光导致截断。
      #   true：保留思考行为（部分场景可能需要看推理过程）。
      enable-thinking: ${AI_ANALYSIS_GLM5_ENABLE_THINKING:false}

    # MiniMax：与 GLM 同走 OpenAI 兼容协议，路由 key=minimax-2.5
    minimax:
      base-url:    ${AI_ANALYSIS_MINIMAX_BASE_URL:http://aihub.spdbdev.com:3000}
      api-key:     ${AI_ANALYSIS_MINIMAX_API_KEY:}
      model:       ${AI_ANALYSIS_MINIMAX_MODEL:minimax-m2.5}
      chat-path:   ${AI_ANALYSIS_MINIMAX_CHAT_PATH:/v1/chat/completions}
      stream:      ${AI_ANALYSIS_MINIMAX_STREAM:false}
      temperature: ${AI_ANALYSIS_MINIMAX_TEMPERATURE:0.2}
      max-tokens:  ${AI_ANALYSIS_MINIMAX_MAX_TOKENS:8192}
      enable-thinking: ${AI_ANALYSIS_MINIMAX_ENABLE_THINKING:false}

# ── DAO 索引巡检模块 ─────────────────────────────────────────────────────────
# 模块默认开启，不再需要 enabled 总开关；部署时填充连接信息即可。
# 建议将真实连接信息放到 application-local.yml，避免密码泄漏到仓库。
dao-index-analysis:

  # 索引元数据缓存（pg_index/pg_attribute 查询去重）
  # 缓存粒度 = (env, tableName)，用来减少目标库压力。
  index-meta:
    # 非空结果缓存秒数：批量分析期间同表去重 + DDL 变更后 N 秒内自动生效。
    # 默认 300（5 分钟）；如果你们 DDL 变更很频繁可调到 60～120。
    cache-seconds: ${DII_INDEX_META_CACHE_SECONDS:300}
    # 空结果缓存秒数：抵御短时连接抖动，权限/连通性修复后能在 N 秒内自愈。
    empty-cache-seconds: ${DII_INDEX_META_EMPTY_CACHE_SECONDS:30}

  # LLM 调用 / JSON 解析失败时的重试策略（适配偶发的网络抖动 + 思考型模型 JSON 截断）
  llm:
    # 不含首次的重试次数。0=不重试，2=最多 3 次尝试。建议 2~3。
    retry-attempts: ${DII_LLM_RETRY_ATTEMPTS:2}
    # 普通错误（JSON 解析失败、空响应等）的线性退避基数：第 N 次重试前等 N*backoff 毫秒。
    # 从 500 调到 2000：500ms 几乎等于"立刻重试"，对真错误作用不大，对瞬时故障也来不及恢复。
    retry-backoff-ms: ${DII_LLM_RETRY_BACKOFF_MS:2000}
    # 网关过载（HTTP 502/503/504）专用退避基数，远大于普通退避。
    # 过载场景下立刻重试只会加剧雪崩；默认 15s × attempt 让上游 MiniMax / 网关先喘口气。
    overload-backoff-ms: ${DII_LLM_OVERLOAD_BACKOFF_MS:15000}

  # 源码扫描：抽取 @Statement 注解里的 SQL
  scan:
    project-roots: ${DII_PROJECT_ROOTS:}        # 逗号分隔的多个工程根目录
    module-pattern: ${DII_MODULE_PATTERN:*-bcc}
    source-root-relative: ${DII_SOURCE_ROOT_RELATIVE:target/gen}
    required-parent-dir: ${DII_REQUIRED_PARENT_DIR:tables}
    file-pattern: ${DII_FILE_PATTERN:**/*.java}
    annotation-fqns:
      - ${DII_ANNOTATION_FQN:com.spdb.ccbs.aps.common.metadata.annotation.Statement}
    sql-attribute-name: ${DII_SQL_ATTRIBUTE_NAME:sql}

  # 目标库（被巡检的 GaussDB/OpenGauss，多环境）
  targets:
    dev:
      url: ${DII_TARGET_DEV_URL:jdbc:opengauss://localhost:5432/database_dev}
      username: ${DII_TARGET_DEV_USERNAME:gaussdb_user}
      password: ${DII_TARGET_DEV_PASSWORD:password123}
    sit:
      url: ${DII_TARGET_SIT_URL:jdbc:opengauss://localhost:5432/database_sit}
      username: ${DII_TARGET_SIT_USERNAME:gaussdb_user}
      password: ${DII_TARGET_SIT_PASSWORD:password123}
    uat:
      url: ${DII_TARGET_UAT_URL:jdbc:opengauss://localhost:5432/database_uat}
      username: ${DII_TARGET_UAT_USERNAME:gaussdb_user}
      password: ${DII_TARGET_UAT_PASSWORD:password123}
  default-env: ${DII_DEFAULT_ENV:dev}

  # 结果库（写入巡检结果的 MySQL，建议与 sunline-benchmark 共库）
  result-datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DII_RESULT_URL:jdbc:mysql://21.64.203.16:3306/benchmarkdb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DII_RESULT_USERNAME:benchmark}
    password: ${DII_RESULT_PASSWORD:benchmark123}
    maximum-pool-size: ${DII_RESULT_MAX_POOL:8}
    minimum-idle: ${DII_RESULT_MIN_IDLE:2}
    connection-test-query: SELECT 1

  # 并发与超时
  concurrency:
    project-parallel: ${DII_PROJECT_PARALLEL:1}
    sql-parallel-per-project: ${DII_SQL_PARALLEL:8}
    # LLM 并发上限：批量回填 LlmEnrichService 用此值初始化 diiLlmExecutor 线程池
    # （core=max=本值），同时也是 SQL 巡检规则引擎里 LLM 并发的上限。
    # 调大可显著提升批量回填吞吐，但也会同步放大对上游 MiniMax/GLM 的压力。
    # 经验：4 适合常规批量；上游稳定时可调到 6~8。
    llm-parallel: ${DII_LLM_PARALLEL:4}
    single-sql-timeout-seconds: ${DII_SQL_TIMEOUT_SECONDS:30}
    llm-retry: ${DII_LLM_RETRY:1}
    explain-retry: ${DII_EXPLAIN_RETRY:1}

  # 幂等窗口：同 sql_hash + env 在该窗口内已存在成功记录则跳过（日级调度用）
  skip-if-analyzed-within-hours: ${DII_SKIP_WITHIN_HOURS:24}

  # 并发复用窗口（分钟）：同 sql_hash + env 在该窗口内有 DONE 记录，直接复用不重新分析
  # 用于保护"多任务/并发压测"下的重复计算。设为 0 可关闭。
  concurrent-reuse-minutes: ${DII_CONCURRENT_REUSE_MINUTES:5}

  # 定时任务
  schedule:
    # 定时任务总开关：false 时彻底屏蔽规则批量 + LLM 回填两条 cron。
    # 默认开启，需要临时停掉时把它改为 false 并重启服务即可。
    enabled: ${DII_SCHEDULE_ENABLED:true}
    # 每日规则引擎 + EXPLAIN 批量巡检 cron（秒 分 时 日 月 周），默认每天 01:00:00
    daily-cron: ${DII_DAILY_CRON:0 0 1 * * ?}
    # 每日 LLM 回填 cron，默认每天 02:00:00（在规则巡检之后跑，此时 llm_pending=1 已就位）
    daily-llm-cron: ${DII_DAILY_LLM_CRON:0 0 2 * * ?}
    # 每日 LLM 回填单次最多处理多少条 item（兜底防爆）
    daily-llm-max-items: ${DII_DAILY_LLM_MAX_ITEMS:2000}

  # Excel 报告导出
  export:
    output-dir: ${DII_REPORT_DIR:/home/cbs/logs/dii-reports}
    retain-days: ${DII_REPORT_RETAIN_DAYS:30}
