server:
  port: 8123
  servlet:
    context-path: /

# 可选：本地覆盖配置，见 application-local.yml.example
spring:
  config:
    import: optional:classpath:application-local.yml

  application:
    name: axon-link-server

  # 静态资源（Vue3 dist 文件）
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

logging:
  level:
    com.axonlink: info
    org.apache.tomcat.util.net: warn
    org.apache.tomcat: warn
    org.apache.catalina: warn

# ── 源码索引配置 ────────────────────────────────────────────────────────────
# source-roots：直接写死若干 src/main/java 目录（逗号分隔）
# workspace-roots：多工程/多模块聚合根目录，自动递归发现子路径下的 src/main/java 与生成源码目录
project:
  source-roots: ${PROJECT_SOURCE_ROOTS:}
  workspace-roots: ${PROJECT_WORKSPACE_ROOTS:}

  index-threads: 0

# ── 代码扫描配置 ──────────────────────────────────────────────────────────────
callgraph:
  include-packages: ${CALLGRAPH_INCLUDE_PACKAGES:cn.sunline.ltts.busi}

# ── Neo4j 图数据库配置 ────────────────────────────────────────────────────────
neo4j:
  enabled: ${NEO4J_ENABLED:false}
  uri: ${NEO4J_URI:bolt://localhost:7687}
  username: ${NEO4J_USERNAME:neo4j}
  password: ${NEO4J_PASSWORD:axonlink123}

flowtran:
  # 当前运行环境标识，仅用于页面展示与日志标记
  datasource: ${FLOWTRAN_DATASOURCE:local}
  cache:
    # 是否启动时预热 XML/Neo4j 元数据缓存
    enabled: ${FLOWTRAN_CACHE_ENABLED:true}

benchmark:
  build-status:
    # sunline-benchmark 服务地址，用于查询最近一次拉取+编译状态
    base-url: ${BENCHMARK_BUILD_STATUS_BASE_URL:http://127.0.0.1:8080}
    timeout-ms: ${BENCHMARK_BUILD_STATUS_TIMEOUT_MS:5000}

ai:
  analysis:
    enabled: ${AI_ANALYSIS_ENABLED:false}
    provider: ${AI_ANALYSIS_PROVIDER:glm5}
    business-prompt-version: ${AI_ANALYSIS_BUSINESS_PROMPT_VERSION:v1}
    technical-prompt-version: ${AI_ANALYSIS_TECHNICAL_PROMPT_VERSION:v1}
    max-code-snippets: ${AI_ANALYSIS_MAX_CODE_SNIPPETS:8}
    max-code-chars-per-snippet: ${AI_ANALYSIS_MAX_CODE_CHARS_PER_SNIPPET:3000}
    request-timeout-seconds: ${AI_ANALYSIS_REQUEST_TIMEOUT_SECONDS:120}
    cache:
      enabled: ${AI_ANALYSIS_CACHE_ENABLED:true}
      ttl-minutes: ${AI_ANALYSIS_CACHE_TTL_MINUTES:30}
    glm5:
      base-url: ${AI_ANALYSIS_GLM5_BASE_URL:}
      api-key: ${AI_ANALYSIS_GLM5_API_KEY:}
      model: ${AI_ANALYSIS_GLM5_MODEL:glm-5}
      chat-path: ${AI_ANALYSIS_GLM5_CHAT_PATH:/v1/chat/completions}
      stream: ${AI_ANALYSIS_GLM5_STREAM:false}
      temperature: ${AI_ANALYSIS_GLM5_TEMPERATURE:0.2}
      max-tokens: ${AI_ANALYSIS_GLM5_MAX_TOKENS:4096}
